<div class="max-w-2xl mx-auto py-6 px-4 flex flex-col gap-4 font-inter text-slate-700">
  <!-- Navigation Header / Back Button -->
  <button
    (click)="goBack()"
    class="self-start flex items-center gap-2 px-4 py-2 text-sm font-semibold text-slate-700 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 hover:text-slate-900 transition shadow-sm cursor-pointer active:scale-95 focus:outline-none"
  >
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="16"
      height="16"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="m15 18-6-6 6-6" />
    </svg>
    <span>Back</span>
  </button>

  <!-- Loading State: Skeleton Card -->
  @if (isLoading()) {
    <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm flex flex-col gap-4">
      <!-- Header -->
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-slate-200 animate-pulse"></div>
        <div class="flex flex-col gap-1.5 flex-1">
          <div class="h-4 bg-slate-200 rounded w-1/3 animate-pulse"></div>
          <div class="h-3 bg-slate-200 rounded w-1/4 animate-pulse"></div>
        </div>
      </div>
      <!-- Body Text -->
      <div class="flex flex-col gap-2">
        <div class="h-4 bg-slate-200 rounded w-full animate-pulse"></div>
        <div class="h-4 bg-slate-200 rounded w-5/6 animate-pulse"></div>
        <div class="h-4 bg-slate-200 rounded w-2/3 animate-pulse"></div>
      </div>
      <!-- Image Placeholders -->
      <div class="w-full h-64 bg-slate-200 rounded-xl animate-pulse"></div>
      <!-- Footer Actions -->
      <div class="flex justify-between items-center border-t border-slate-100 pt-3">
        <div class="h-8 bg-slate-100 rounded-lg w-20 animate-pulse"></div>
        <div class="h-8 bg-slate-100 rounded-lg w-20 animate-pulse"></div>
        <div class="h-8 bg-slate-100 rounded-lg w-20 animate-pulse"></div>
      </div>
    </div>
  }

  <!-- Error / Not Found State -->
  @else if (isError()) {
    <div
      class="flex flex-col items-center justify-center py-16 px-4 text-center rounded-2xl border border-slate-200 bg-white shadow-sm gap-4"
    >
      <div
        class="w-16 h-16 rounded-full bg-rose-50 border border-rose-100 text-rose-500 flex items-center justify-center shadow-xs"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="28"
          height="28"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" />
          <line x1="12" y1="9" x2="12" y2="13" />
          <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
      </div>
      <div class="flex flex-col gap-1.5 max-w-sm">
        <h3 class="font-extrabold text-slate-900 text-lg">Post not found</h3>
        <p class="text-sm text-slate-500 leading-normal">
          This post may have been deleted, or the link might be broken.
        </p>
      </div>
      <button
        (click)="goBack()"
        class="mt-2 px-5 py-2 text-xs font-bold text-white bg-slate-900 hover:bg-slate-800 rounded-xl transition cursor-pointer shadow-xs active:scale-95"
      >
        Go Back
      </button>
    </div>
  }

  <!-- Loaded State: Single Post Component -->
  @else {
    <app-single-post
      [post]="postData()"
      [expandComments]="true"
      [showDetailsLink]="false"
      (postDeleted)="onPostDeleted()"
    />
  }
</div>
