<!doctype html>
<html lang="en">
  <head>
    <!-- ========================================== -->
    <!-- Essential Meta Tags -->
    <!-- ========================================== -->
    <meta charset="utf-8" />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ========================================== -->
    <!-- Primary SEO Meta Tags -->
    <!-- ========================================== -->
    <title>Vibely Posts | Modern Social Media App</title>

    <meta name="title" content="Vibely Posts - Modern Social Media App" />
    <meta
      name="description"
      content="Vibely Posts is a modern social media web application where users can share posts, explore feeds, view profiles, receive notifications, discover suggestions, and connect with others through a clean and responsive experience."
    />
    <meta
      name="keywords"
      content="Vibely Posts, social media app, Angular social app, posts app, feed app, user profiles, notifications, suggestions, post details, modern web app"
    />
    <meta name="author" content="Ahmed Reda" />
    <meta name="language" content="English" />
    <meta name="generator" content="Angular" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://social-app-phi-three.vercel.app/" />

    <!-- ========================================== -->
    <!-- Web App & Theme Configuration -->
    <!-- ========================================== -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="application-name" content="Vibely Posts" />
    <meta name="apple-mobile-web-app-title" content="Vibely Posts" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />

    <!-- ========================================== -->
    <!-- Favicon & App Icons -->
    <!-- ========================================== -->
    <link rel="icon" type="image/png" href="/assets/images/logo.png" />
    <link rel="apple-touch-icon" href="/assets/images/logo.png" />

    <!-- ========================================== -->
    <!-- Performance Optimization -->
    <!-- ========================================== -->

    <!-- Preconnect improves loading time for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- DNS Prefetch helps browsers resolve font domains earlier -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Font loading with display=swap improves performance -->
    <link
      href="https://fonts.googleapis.com/css2?family=Akt:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- ========================================== -->
    <!-- Open Graph / Facebook / LinkedIn SEO -->
    <!-- ========================================== -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://social-app-phi-three.vercel.app/" />
    <meta property="og:title" content="Vibely Posts - Modern Social Media App" />
    <meta
      property="og:description"
      content="Share posts, explore feeds, view profiles, receive notifications, discover suggestions, and connect with others using Vibely Posts."
    />
    <meta
      property="og:image"
      content="https://social-app-phi-three.vercel.app/assets/images/logo.png"
    />
    <meta property="og:image:alt" content="Vibely Posts App Preview" />
    <meta property="og:site_name" content="Vibely Posts" />
    <meta property="og:locale" content="en_US" />

    <!-- ========================================== -->
    <!-- Twitter Cards SEO -->
    <!-- ========================================== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://social-app-phi-three.vercel.app/" />
    <meta name="twitter:title" content="Vibely Posts - Modern Social Media App" />
    <meta
      name="twitter:description"
      content="A modern Angular social media app with authentication, posts, profiles, notifications, suggestions, and responsive UI."
    />
    <meta
      name="twitter:image"
      content="https://social-app-phi-three.vercel.app/assets/images/logo.png"
    />
    <meta name="twitter:image:alt" content="Vibely Posts App Preview" />
    <meta name="twitter:creator" content="@ahmedredarouteacademy" />
  </head>

  <body>
    <app-root></app-root>
  </body>
</html>
